<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#ccff00" stroke-width="4" opacity="0.9"/>
  <!-- Monitor body -->
  <rect x="96" y="100" width="320" height="220" rx="16" fill="url(#screen)" stroke="#ccff00" stroke-width="5"/>
  <!-- Screen inner -->
  <rect x="116" y="120" width="280" height="180" rx="8" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <!-- Monitor stand -->
  <rect x="220" y="320" width="72" height="40" fill="#1a1a1a" stroke="#ccff00" stroke-width="3"/>
  <rect x="180" y="355" width="152" height="12" rx="6" fill="#1a1a1a" stroke="#ccff00" stroke-width="3"/>
  <!-- Acid "A" on screen -->
  <text x="256" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="120" fill="#ccff00" filter="url(#glow)">A</text>
  <!-- Signal bars -->
  <rect x="340" y="210" width="12" height="20" rx="2" fill="#00d2ff" opacity="0.8"/>
  <rect x="356" y="195" width="12" height="35" rx="2" fill="#00d2ff" opacity="0.8"/>
  <rect x="372" y="180" width="12" height="50" rx="2" fill="#ccff00" opacity="0.9"/>
  <!-- Pulse dot -->
  <circle cx="145" cy="145" r="8" fill="#ccff00" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
